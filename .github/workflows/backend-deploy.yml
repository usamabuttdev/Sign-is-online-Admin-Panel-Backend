name: Build & Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: your-backend-runner-label

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Reload app with PM2
        run: |
          pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js
          pm2 save

      - name: Health check
        run: |
          sleep 5
          curl --fail http://localhost:5000 || (pm2 logs backend --lines 50 && exit 1)
