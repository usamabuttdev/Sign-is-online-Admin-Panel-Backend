name: Build & Deploy Backend
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: sign-in-backend
    steps:
      - name: Pull latest code
        run: |
          cd /home/ec2-user/Sign-is-online-Admin-Panel-Backend
          git pull origin main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: /home/ec2-user/Sign-is-online-Admin-Panel-Backend
        run: npm install

      - name: Restart backend via systemd
        run: |
          cd /home/ec2-user/Sign-is-online-Admin-Panel-Backend
          # Create persistent systemd service for the backend
          sudo tee /etc/systemd/system/backend.service > /dev/null <<'SERVICE'
[Unit]
Description=Storefront Backend API
After=network.target

[Service]
Type=simple
User=ec2-user
WorkingDirectory=/home/ec2-user/Sign-is-online-Admin-Panel-Backend
ExecStart=/usr/bin/env node app.js
Restart=on-failure
RestartSec=5
Environment=PORT=5000

[Install]
WantedBy=multi-user.target
SERVICE
          sudo systemctl daemon-reload
          sudo systemctl restart backend
          sudo systemctl enable backend 2>/dev/null || true

      - name: Health check
        run: |
          sleep 5
          curl --fail http://localhost:5000 || (sudo journalctl -u backend --no-pager -n 50 && exit 1)
