name: Build & Deploy Backend
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: sign-in-backend
    steps:
      - name: Pull latest code
        run: |
          cd /home/ec2-user/Sign-is-online-Admin-Panel-Backend
          git pull origin main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: /home/ec2-user/Sign-is-online-Admin-Panel-Backend
        run: npm install

      - name: Ensure PM2 daemon is managed by systemd
        run: |
          sudo env PATH=$PATH pm2 startup -u ec2-user --hp /home/ec2-user 2>/dev/null || true
          sudo systemctl start pm2-ec2-user 2>/dev/null || true

      - name: Start backend with PM2
        run: |
          cd /home/ec2-user/Sign-is-online-Admin-Panel-Backend
          pm2 delete all 2>/dev/null || true
          pm2 start app.js --name backend -- --port=5000

      - name: Health check
        run: |
          sleep 5
          curl --fail http://localhost:5000 || exit 1
